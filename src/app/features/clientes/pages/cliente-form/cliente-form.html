<div class="container">
    <div class="card shadow text-center">
        <div class="card-header text-center">
            <h4 class="fw-bold mb-0">
                Formulario de Cliente
            </h4>
            <p class="text-muted mb-0">Registro de clientes del sistema</p>
        </div>
        <div class="card-body">
            <form action="">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">DUI</label>
                        <input type="text" class="form-control" placeholder="12345678-9">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" placeholder="1234-5678">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Direccion</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select">
                            <option>Activo</option>
                            <option>Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success me-2">Guardar</button>

                    <a routerLink="/clientes" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
