<div class="container">
    <div class="row mb-4">
        <div class="col-lg-12">
            <h2 class="text-center">Dashboard</h2>
            <p class="text-muted mb-0">Bienvenido al Dashboard</p>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h4 class="card-title">Total de Clientes</h4>
                    <h3 class="fw-bold text-primary">{{ totalClientes }}</h3>
                    <p class="text-muted mb-0">Clientes resgistrados en el sistema</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h4 class="card-title">Total de Cuentas</h4>
                    <h3 class="fw-bold text-primary">{{ totalCuentas }}</h3>
                    <p class="text-muted mb-0">Cuentas registradas en el sistema</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h4 class="card-title">Total de Tipos de cuentas</h4>
                    <h3 class="fw-bold text-primary">{{ totalTiposCuentas }}</h3>
                    <p class="text-muted mb-0">Tipos de cuentas disponibles en el sistema</p>
                </div>
            </div>
        </div>
    </div>
</div>
